name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela execuções antigas do mesmo PR/branch quando um novo push chega,
# economizando minutos de Actions.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificacoes:
    name: Lint, build e testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      # Os passos abaixo usam `!cancelled()` para que todos rodem mesmo que
      # um deles falhe — assim o PR mostra todos os problemas de uma vez.
      - name: Lint (ESLint)
        if: ${{ !cancelled() }}
        run: npm run lint

      - name: Type-check + build (tsc + vite)
        if: ${{ !cancelled() }}
        run: npm run build

      - name: Testes (Vitest)
        if: ${{ !cancelled() }}
        run: npm test
